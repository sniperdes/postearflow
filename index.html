<!DOCTYPE html>
<html lang="es">
<head>

        header {

            display: inline-block;

            text-decoration: none;

            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover {
            background-color: #ffd633;
        }
        footer {
